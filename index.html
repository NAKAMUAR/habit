<title>習慣の暦 — 外見・健康・内面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<!-- ▼ クラウド同期（Firebase: Googleログイン ＋ Firestore） -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB3ascsGRGJ6_95YyIwUihmlVI6QCmPd5g",
    authDomain: "habit-app-24603.firebaseapp.com",
    projectId: "habit-app-24603",
    storageBucket: "habit-app-24603.firebasestorage.app",
    messagingSenderId: "39808191286",
    appId: "1:39808191286:web:202a7184d8745c14710197"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });

  async function pull(uid){
    const snap = await getDoc(doc(db, 'users', uid));
    if(!snap.exists()) return null;
    return (snap.data() || {}).data || null;
  }
  async function push(uid, data, profile){
    await setDoc(doc(db, 'users', uid), {
      profile: profile || {},
      data: data,
      updatedAt: serverTimestamp()
    }, { merge: true });
  }

  window.HabitCloud = {
    KEYS: ['habits','logs','settings','shopping'],
    onAuth(cb){ return onAuthStateChanged(auth, cb); },
    async signInWithGoogle(){
      try { const r = await signInWithPopup(auth, provider); return r.user; }
      catch(e){
        if(e.code==='auth/popup-closed-by-user' || e.code==='auth/cancelled-popup-request') return null;
        if(e.code==='auth/popup-blocked'){ await signInWithRedirect(auth, provider); return null; }
        throw e;
      }
    },
    signOut(){ return signOut(auth); },
    pull, push,
    errorMessage(e){
      switch(e && e.code){
        case 'auth/unauthorized-domain': return 'このドメインはFirebaseで許可されていません（承認済みドメインに nakamuar.github.io を追加してください）';
        case 'auth/operation-not-allowed': return 'FirebaseでGoogleログインを有効にしてください';
        case 'auth/network-request-failed': return 'ネットワークエラー — 接続を確認してください';
        case 'permission-denied': return 'Firestoreのルールでアクセスが拒否されました（ルールを設定してください）';
        case 'unavailable': return 'Firestoreに接続できません — データベースは作成済みですか？';
        default: return 'エラー: ' + ((e && e.message) || e);
      }
    }
  };

  // redirect方式でログインした場合の復帰処理 → 準備完了を通知
  getRedirectResult(auth).catch(()=>{}).finally(()=>{
    window.dispatchEvent(new Event('habitcloud-ready'));
  });
</script>

<style>
  :root{
    --washi:#F6F1E7;
    --paper:#FCFAF4;
    --sumi:#2B2722;
    --sumi-soft:#6B635A;
    --line:#E4DBC9;
    --line-strong:#C9B89A;
    --kenko:#5E8C6A;   /* 健康 常磐風 */
    --gaiken:#C77E8E;  /* 外見 退紅 */
    --naimen:#8A6BA1;  /* 内面 古代紫 */
    --kenko-bg:#E9F0EA;
    --gaiken-bg:#F5E7EA;
    --naimen-bg:#EDE7F1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Serif JP", "Yu Mincho","YuMincho","Hiragino Mincho ProN", serif;
    background:var(--washi);
    color:var(--sumi);
    -webkit-font-smoothing:antialiased;
  }
  #root{max-width:520px;margin:0 auto;min-height:100vh;position:relative;}
  .screen{padding:calc(20px + env(safe-area-inset-top)) 18px 96px 18px;}
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
  .topbar .title{font-size:21px;font-weight:600;letter-spacing:.08em;}
  .topbar .date{font-size:12.5px;color:var(--sumi-soft);letter-spacing:.06em;}

  /* 今日の達成 */
  .achieve{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:18px;
    box-shadow:0 1px 0 rgba(0,0,0,.02);
  }
  .achieve .ring{position:relative;width:64px;height:64px;flex:0 0 auto;}
  .achieve .ring svg{transform:rotate(-90deg);}
  .achieve .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:600;letter-spacing:.02em;}
  .achieve .lbl{font-size:13px;color:var(--sumi-soft);letter-spacing:.08em;}
  .achieve .big{font-size:18px;font-weight:600;margin-top:2px;letter-spacing:.06em;}

  /* 短冊リスト行 */
  .tanzaku{
    display:flex;align-items:center;background:var(--paper);
    border:1px solid var(--line);border-left-width:5px;border-radius:10px;
    padding:13px 14px;margin-bottom:9px;transition:background .15s;
  }
  .tanzaku.done{background:#F1EEE4;}
  .tanzaku .time{font-size:12px;color:var(--sumi-soft);width:46px;flex:0 0 auto;letter-spacing:.02em;}
  .tanzaku .body{flex:1;min-width:0;}
  .tanzaku .name{font-size:15.5px;line-height:1.4;}
  .tanzaku.done .name{color:var(--sumi-soft);text-decoration:line-through;text-decoration-thickness:1px;}
  .tanzaku .cat{font-size:11px;color:var(--sumi-soft);margin-top:2px;letter-spacing:.06em;}
  .check{
    width:30px;height:30px;flex:0 0 auto;border-radius:50%;border:1.5px solid var(--line-strong);
    background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:transparent;transition:all .15s;
  }
  .check.on{background:var(--sumi);border-color:var(--sumi);color:var(--paper);}

  .section-label{font-size:12.5px;color:var(--sumi-soft);letter-spacing:.14em;margin:20px 2px 10px;}
  .empty{color:var(--sumi-soft);font-size:13.5px;text-align:center;padding:36px 12px;line-height:1.9;}

  /* 週間ビュー */
  .grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px;background:var(--paper);}
  table.week{border-collapse:collapse;width:100%;font-size:12px;}
  table.week th, table.week td{padding:9px 4px;text-align:center;border-bottom:1px solid var(--line);}
  table.week thead th{font-weight:500;color:var(--sumi-soft);font-size:11px;}
  table.week th.hname{text-align:left;padding-left:12px;min-width:118px;font-weight:400;font-size:12.5px;color:var(--sumi);}
  table.week td .cell{width:18px;height:18px;border-radius:5px;margin:0 auto;border:1px solid var(--line);}
  table.week .today-col{background:#F1EEE4;}

  /* 統計 */
  .stat-row{background:var(--paper);border:1px solid var(--line);border-left-width:5px;border-radius:10px;
    padding:13px 14px;margin-bottom:9px;}
  .stat-row .name{font-size:15px;}
  .stat-row .nums{display:flex;gap:22px;margin-top:8px;}
  .stat-row .nums .k{font-size:11px;color:var(--sumi-soft);letter-spacing:.06em;}
  .stat-row .nums .v{font-size:18px;font-weight:600;}
  .stat-row .nums .v small{font-size:11px;font-weight:400;color:var(--sumi-soft);margin-left:1px;}

  /* 習慣管理 */
  .habit-row{display:flex;align-items:center;background:var(--paper);border:1px solid var(--line);
    border-left-width:5px;border-radius:10px;padding:12px 14px;margin-bottom:9px;gap:10px;}
  .habit-row.off{opacity:.5;}
  .habit-row .body{flex:1;min-width:0;}
  .habit-row .name{font-size:15px;}
  .habit-row .meta{font-size:11px;color:var(--sumi-soft);margin-top:3px;letter-spacing:.04em;}
  .toggle{width:42px;height:24px;border-radius:13px;background:var(--line-strong);position:relative;
    cursor:pointer;flex:0 0 auto;transition:background .2s;border:none;}
  .toggle.on{background:var(--kenko);}
  .toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
    background:#fff;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .toggle.on .knob{left:20px;}
  .icon-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--sumi-soft);padding:6px;}

  .fab{position:fixed;right:calc(50% - 260px + 18px);bottom:84px;z-index:30;
    background:var(--sumi);color:var(--paper);border:none;border-radius:28px;
    padding:13px 20px;font-family:inherit;font-size:14px;letter-spacing:.08em;cursor:pointer;
    box-shadow:0 4px 14px rgba(43,39,34,.28);}
  @media(max-width:556px){.fab{right:18px;}}

  /* フォーム */
  .modal-bg{position:fixed;inset:0;background:rgba(43,39,34,.4);z-index:40;display:flex;
    align-items:flex-end;justify-content:center;}
  .modal{background:var(--washi);width:100%;max-width:520px;border-radius:18px 18px 0 0;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;}
  .modal h3{margin:0 0 18px;font-size:17px;font-weight:600;letter-spacing:.06em;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;color:var(--sumi-soft);margin-bottom:7px;letter-spacing:.06em;}
  .field input[type=text], .field input[type=time], .field select, .field textarea{
    width:100%;padding:11px 12px;border:1px solid var(--line-strong);border-radius:9px;
    background:var(--paper);font-family:inherit;font-size:15px;color:var(--sumi);}
  .field textarea{resize:vertical;min-height:54px;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:10px;border:1px solid var(--line-strong);background:var(--paper);
    border-radius:9px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--sumi-soft);}
  .seg button.sel{background:var(--sumi);color:var(--paper);border-color:var(--sumi);}
  .cat-pick{display:flex;gap:8px;}
  .cat-pick button{flex:1;padding:10px 6px;border-radius:9px;border:1.5px solid var(--line);
    background:var(--paper);font-family:inherit;font-size:13.5px;cursor:pointer;color:var(--sumi-soft);}
  .cat-pick button.sel{color:#fff;font-weight:500;}
  .row2{display:flex;gap:12px;}
  .row2 .field{flex:1;}
  .form-actions{display:flex;gap:10px;margin-top:8px;}
  .btn-main{flex:1;padding:13px;background:var(--sumi);color:var(--paper);border:none;border-radius:10px;
    font-family:inherit;font-size:15px;letter-spacing:.08em;cursor:pointer;}
  .btn-sub{padding:13px 18px;background:transparent;color:var(--sumi-soft);border:1px solid var(--line-strong);
    border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;}
  .btn-del{width:100%;margin-top:14px;padding:11px;background:transparent;color:var(--gaiken);
    border:1px solid var(--gaiken);border-radius:10px;font-family:inherit;font-size:13.5px;cursor:pointer;}

  /* 設定 */
  .setting-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px;}
  .note{font-size:12px;color:var(--sumi-soft);line-height:1.8;margin-top:8px;}

  /* 買い物 */
  .shop-tier{margin-bottom:4px;}
  .shop-tier-head{display:flex;align-items:baseline;justify-content:space-between;margin:20px 2px 8px;}
  .shop-tier-head .t{font-size:14.5px;font-weight:600;letter-spacing:.06em;}
  .shop-tier-head .p{font-size:11.5px;color:var(--sumi-soft);}
  .shop-tier-note{font-size:11.5px;color:var(--sumi-soft);line-height:1.7;margin:0 2px 10px;}
  .shop-item{display:flex;align-items:flex-start;gap:11px;background:var(--paper);
    border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:8px;}
  .shop-item.bought{background:#F1EEE4;}
  .shop-item .body{flex:1;min-width:0;padding-top:3px;}
  .shop-item .nm{font-size:14.5px;line-height:1.4;}
  .shop-item.bought .nm{color:var(--sumi-soft);text-decoration:line-through;text-decoration-thickness:1px;}
  .shop-item .dt{font-size:11.5px;color:var(--sumi-soft);line-height:1.65;margin-top:5px;}
  .shop-item .x{background:none;border:none;color:var(--line-strong);font-size:14px;cursor:pointer;
    padding:4px 0 4px 6px;flex:0 0 auto;}

  /* 下部タブ */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
    background:rgba(246,241,231,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);
    display:flex;z-index:35;padding-bottom:env(safe-area-inset-bottom);}
  .tabbar button{flex:1;background:none;border:none;padding:9px 0 8px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--sumi-soft);font-family:inherit;}
  .tabbar button.active{color:var(--sumi);}
  .tabbar .ti{font-size:18px;line-height:1;}
  .tabbar .tl{font-size:10px;letter-spacing:.08em;}
  .tabbar button.active .tl{font-weight:600;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ---------- 保存（localStorage、不可なら一時メモリに退避） ---------- */
const mem = {};
const store = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return (k in mem)? mem[k] : null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } }
};
const load = (k, fb) => { const v = store.get(k); if(v==null) return fb; try { return JSON.parse(v); } catch(e){ return fb; } };

/* ---------- クラウド同期（Firebase / Firestore） ---------- */
const SYNC_KEYS = ['habits','logs','settings','shopping'];
let _cloudUid = null, _cloudProfile = null, _loadedUid = null, _syncTimer = null;
function setCloudUser(uid, profile){ _cloudUid = uid; _cloudProfile = profile; }
function snapshotAll(){ const o={}; SYNC_KEYS.forEach(k=>{ const v=store.get(k); if(v!=null){ try{ o[k]=JSON.parse(v); }catch(e){} } }); return o; }
function cloudSync(){
  if(!_cloudUid || !window.HabitCloud) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(()=>{
    window.HabitCloud.push(_cloudUid, snapshotAll(), _cloudProfile).catch(e=>console.warn('クラウド保存に失敗', e));
  }, 800);
}

const save = (k, v) => { store.set(k, JSON.stringify(v)); cloudSync(); };

/* ---------- 日付ユーティリティ ---------- */
const pad = n => String(n).padStart(2,'0');
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayStr = () => ymd(new Date());
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const WD = ['日','月','火','水','木','金','土'];
const startOfWeekMon = (d) => { const x=new Date(d); const g=(x.getDay()+6)%7; x.setHours(0,0,0,0); return addDays(x,-g); };

/* ---------- カテゴリ（固定3件） ---------- */
const CATS = [
  { id:1, name:'外見', color:'var(--gaiken)', hex:'#C77E8E', bg:'var(--gaiken-bg)' },
  { id:2, name:'健康', color:'var(--kenko)',  hex:'#5E8C6A', bg:'var(--kenko-bg)'  },
  { id:3, name:'内面', color:'var(--naimen)', hex:'#8A6BA1', bg:'var(--naimen-bg)' },
];
const catOf = id => CATS.find(c=>c.id===id) || CATS[1];

/* ---------- 初期シードデータ ---------- */
let _id = 1; const nid = () => _id++;
const seedHabits = () => { _id = 1; return [
  // 健康
  h('起床・朝日を浴びる',2,'daily',null,'07:00',true),
  h('スキンケア（洗顔→化粧水→乳液→日焼け止め）',1,'daily',null,'07:05',true),
  h('ヒゲを整える',1,'daily',null,'07:05',true),
  h('朝食（卵納豆ご飯＋野菜＋海藻）',2,'daily',null,'07:15',true),
  h('資格勉強30分',3,'daily',null,'07:30',true),
  h('散歩（一駅歩く等）',2,'daily',null,'08:00',true),
  h('水分補給',2,'daily',null,null,true),
  h('昼食（タンパク質＋野菜＋海藻）',2,'daily',null,'12:00',true),
  h('読書10分',3,'daily',null,'22:00',true),
  h('3行日記＋今日学んだこと',3,'daily',null,'22:50',true),
  h('就寝',2,'daily',null,'23:00',true),
  h('会話で聞く＋質問1つを意識',3,'daily',null,null,true),
  // ここから下は「定着したら有効化」する習慣（最初はお休み）
  h('ジム（筋トレ）',2,'weekly',3,'19:00',false),
  h('ヨガ',2,'weekly',2,'19:00',false),
  h('バスケ',2,'weekly',1,'19:00',false),
  h('爪を整える',1,'weekly',1,null,false),
  h('鼻毛・耳毛チェック',1,'weekly',1,null,false),
  h('散髪（目安：月1回）',1,'weekly',1,null,false),
  h('眉キープ処理',1,'weekly',1,null,false),
];};
function h(title, categoryId, frequencyType, frequencyCount, recommendedTime, isActive){
  return { id:nid(), categoryId, title, description:'', frequencyType, frequencyCount, recommendedTime, isActive };
}

/* ---------- ログ操作（キー = habitId|YYYY-MM-DD） ---------- */
const logKey = (hid, date) => `${hid}|${date}`;

/* ---------- 買い物リスト ---------- */
const TIERS = [
  { tier:1, title:'睡眠と勉強の土台', note:'習慣全体の土台になるので最優先。特にマットレスと椅子は体に合うかが大切なので、可能なら店舗で試してから。' },
  { tier:2, title:'毎日の習慣を支える', note:'毎朝の身だしなみ・運動・睡眠の質に効くもの。' },
  { tier:3, title:'健康食と快適性', note:'健康的な食事を続けやすくし、部屋の快適さを上げるもの。' },
  { tier:4, title:'あると快適（後回しでOK）', note:'急がないもの。余裕が出たら。' },
];
let _sid = 1; const ss = (tier,name,detail) => ({ id:'s'+(_sid++), tier, name, detail:detail||'', bought:false });
const seedShopping = () => { _sid = 1; return [
  // 第1優先
  ss(1,'マットレス','コスパ=ニトリ（Nスリープ）／腰痛対策=エマ・スリープ、コアラ、雲のやすらぎ／高級=西川・シモンズ'),
  ss(1,'枕','ブレインスリープ ピロー、テンピュール、ニトリ（高さ調整枕）'),
  ss(1,'遮光カーテン','ニトリ、無印良品'),
  ss(1,'光目覚まし時計','トトノエライト、Philips ウェイクアップライト（HF3520）'),
  ss(1,'デスク','ニトリ、IKEA、FlexiSpot（電動昇降）'),
  ss(1,'ワークチェア','1万円台=ニトリ・IKEA MARKUS／中価格=エルゴヒューマン・コクヨ ing／高級=ハーマンミラー アーロン・オカムラ シルフィー'),
  ss(1,'デスクライト','BenQ ScreenBar、パナソニック'),
  // 第2優先
  ss(2,'鏡用ライト','女優ミラー／LED卓上ミラー'),
  ss(2,'スキンケア用品一式','ハトムギ化粧水（ナチュリエ）またはキュレル ＋ 乳液 ＋ 日焼け止め'),
  ss(2,'スキンケア収納トレー・ラック','定位置づくり用'),
  ss(2,'ヒゲシェーバー','ブラウン、パナソニック、フィリップス（肌質で選ぶ）'),
  ss(2,'眉ケア用品','資生堂・貝印の眉ハサミ・コーム・毛抜き'),
  ss(2,'鼻毛・耳毛カッター','パナソニック エチケットカッター（ER-GN系）'),
  ss(2,'爪切り・爪やすり',''),
  ss(2,'ヨガマット','マンドゥカ、ニトリ、Amazonベーシック'),
  ss(2,'加湿器','象印（手入れ簡単）、ダイニチ'),
  ss(2,'空気清浄機','シャープ Purefit、ダイキン 加湿ストリーマ（MCK系・一台二役）'),
  // 第3優先
  ss(3,'レンジ調理器具','曙産業「レンジでらくチン」、ニトリ蒸し調理器'),
  ss(3,'保存容器','野田琺瑯、iwaki（耐熱ガラス）、ジップロック コンテナー'),
  ss(3,'ダイニングテーブル＋椅子','ながら食べ防止'),
  ss(3,'調光照明・シーリングライト','アイリスオーヤマ、パナソニック'),
  ss(3,'間接照明・フロアランプ','無印良品、IKEA'),
  ss(3,'観葉植物',''),
  ss(3,'常備食材ストック','納豆・もずく酢・めかぶ・乾物の海藻 など'),
  // 第4優先
  ss(4,'外部モニター','Dell・LG・iiyama（24〜27インチ）＋モニター台'),
  ss(4,'フォームローラー','トリガーポイント グリッド（体のケア用）'),
  ss(4,'ノイズキャンセリングイヤホン・耳栓','集中環境づくり'),
  ss(4,'コードレス掃除機','マキタ（軽量・安価）、ダイソン'),
  ss(4,'温湿度計','タニタ、ドリテック'),
  ss(4,'サーキュレーター・除湿機',''),
  ss(4,'アロマ・香り・装飾小物','家にいる心地よさ'),
];};

/* =================================================================== */
function App({ account }){
  const [habits, setHabits]   = useState(() => load('habits', null) || seedHabits());
  const [logs, setLogs]       = useState(() => load('logs', {}));        // { "id|date": true }
  const [settings, setSettings] = useState(() => load('settings', { name:'わたし', wakeTime:'07:00', sleepTime:'23:00' }));
  const [tab, setTab]         = useState('home');
  const [shopping, setShopping] = useState(() => load('shopping', null) || seedShopping());
  const [editing, setEditing] = useState(null);      // habitオブジェクト or {new:true}
  const [shopEditing, setShopEditing] = useState(null);

  useEffect(()=>{ save('habits', habits); }, [habits]);
  useEffect(()=>{ save('logs', logs); }, [logs]);
  useEffect(()=>{ save('settings', settings); }, [settings]);
  useEffect(()=>{ save('shopping', shopping); }, [shopping]);

  const toggleLog = (hid, date) => {
    const k = logKey(hid, date);
    setLogs(prev => { const n = {...prev}; if(n[k]) delete n[k]; else n[k]=true; return n; });
  };
  const isDone = (hid, date) => !!logs[logKey(hid, date)];

  const saveHabit = (data) => {
    if(data.id){ setHabits(hs => hs.map(x => x.id===data.id ? {...x, ...data} : x)); }
    else { setHabits(hs => [...hs, {...data, id:(Math.max(0,...hs.map(x=>x.id))+1)}]); }
    setEditing(null);
  };
  const deleteHabit = (id) => { setHabits(hs => hs.filter(x=>x.id!==id)); setEditing(null); };
  const toggleActive = (id) => setHabits(hs => hs.map(x => x.id===id ? {...x, isActive:!x.isActive} : x));

  const toggleBought = (id) => setShopping(ss => ss.map(x => x.id===id ? {...x, bought:!x.bought} : x));
  const addShopItem = (data) => { setShopping(ss => [...ss, { id:'c'+Date.now(), tier:Number(data.tier), name:data.name, detail:data.detail||'', bought:false }]); setShopEditing(null); };
  const deleteShopItem = (id) => setShopping(ss => ss.filter(x=>x.id!==id));

  const ctx = { habits, logs, settings, setSettings, isDone, toggleLog, toggleActive, setEditing,
                shopping, toggleBought, deleteShopItem, account };

  return (
    <React.Fragment>
      { tab==='home'    && <Home {...ctx} /> }
      { tab==='weekly'  && <Weekly {...ctx} /> }
      { tab==='habits'  && <Habits {...ctx} /> }
      { tab==='stats'   && <Stats {...ctx} /> }
      { tab==='shop'    && <Shopping {...ctx} /> }
      { tab==='settings'&& <Settings {...ctx} /> }

      { tab==='habits' &&
        <button className="fab" onClick={()=>setEditing({ new:true })}>＋ 習慣を追加</button> }
      { tab==='shop' &&
        <button className="fab" onClick={()=>setShopEditing({ new:true })}>＋ 品目を追加</button> }

      { editing &&
        <HabitForm habit={editing.new ? null : editing}
                   onSave={saveHabit} onDelete={deleteHabit} onClose={()=>setEditing(null)} /> }
      { shopEditing &&
        <ShoppingForm onSave={addShopItem} onClose={()=>setShopEditing(null)} /> }

      <TabBar tab={tab} setTab={setTab} />
    </React.Fragment>
  );
}

/* ---------- ホーム ---------- */
function Home({ habits, isDone, toggleLog, setEditing }){
  const date = todayStr();
  const list = useMemo(()=>{
    return habits.filter(h=>h.isActive)
      .slice()
      .sort((a,b)=>{
        const ta=a.recommendedTime||'99:99', tb=b.recommendedTime||'99:99';
        return ta.localeCompare(tb);
      });
  }, [habits]);

  const total = list.length;
  const done = list.filter(h=>isDone(h.id, date)).length;
  const pct = total? done/total : 0;

  const today = new Date();
  const dateLabel = `${today.getMonth()+1}月${today.getDate()}日（${WD[today.getDay()]}）`;

  return (
    <div className="screen">
      <div className="topbar">
        <div className="title">今日の習慣</div>
        <div className="date">{dateLabel}</div>
      </div>

      <div className="achieve">
        <div className="ring">
          <svg width="64" height="64">
            <circle cx="32" cy="32" r="27" fill="none" stroke="#E4DBC9" strokeWidth="6"/>
            <circle cx="32" cy="32" r="27" fill="none" stroke="#2B2722" strokeWidth="6"
              strokeLinecap="round" strokeDasharray={2*Math.PI*27}
              strokeDashoffset={2*Math.PI*27*(1-pct)} />
          </svg>
          <div className="num">{done}/{total}</div>
        </div>
        <div>
          <div className="lbl">今日の達成</div>
          <div className="big">{ total===0 ? '習慣がありません'
            : done===total ? 'すべて達成しました' : `あと ${total-done} つ` }</div>
        </div>
      </div>

      { total===0
        ? <div className="empty">有効な習慣がありません。<br/>「習慣管理」から追加・有効化してください。</div>
        : list.map(hb => {
            const c = catOf(hb.categoryId); const d = isDone(hb.id, date);
            return (
              <div key={hb.id} className={"tanzaku"+(d?' done':'')} style={{borderLeftColor:c.hex}}>
                <div className="time">{hb.recommendedTime || '—'}</div>
                <div className="body">
                  <div className="name">{hb.title}</div>
                  <div className="cat">{c.name}{ hb.frequencyType==='weekly' ? ` ・週${hb.frequencyCount}回` : '' }</div>
                </div>
                <button className={"check"+(d?' on':'')} onClick={()=>toggleLog(hb.id, date)}

/* ---------- 計算：ストリーク・達成率 ---------- */
function calcDailyStreak(hid, isDone){
  let streak=0; let d=new Date();
  // 今日まだ未達成なら、昨日を起点にして数える（途中で途切れさせない配慮）
  if(!isDone(hid, ymd(d))) d=addDays(d,-1);
  while(isDone(hid, ymd(d))){ streak++; d=addDays(d,-1); }
  return streak;
}
function calcWeeklyStreak(hid, count, isDone){
  let streak=0; let ws=startOfWeekMon(new Date());
  // 今週がまだノルマ未達でも途切れさせないため、未達なら先週起点
  const weekDone = (start)=>{ let n=0; for(let i=0;i<7;i++){ if(isDone(hid, ymd(addDays(start,i)))) n++; } return n; };
  if(weekDone(ws) < count) ws=addDays(ws,-7);
  while(weekDone(ws) >= count){ streak++; ws=addDays(ws,-7); }
  return streak;
}
function calcRate(hb, isDone){
  const N=30; const base=new Date();
  if(hb.frequencyType==='daily'){
    let done=0; for(let i=0;i<N;i++){ if(isDone(hb.id, ymd(addDays(base,-i)))) done++; }
    return done/N*100;
  } else {
    // 週ノルマ × 4週 を分母に（直近約4週間）
    let done=0; for(let i=0;i<28;i++){ if(isDone(hb.id, ymd(addDays(base,-i)))) done++; }
    const denom = (hb.frequencyCount||1)*4;
    return Math.min(100, done/denom*100);
  }
}

function Stats({ habits, isDone }){
  const list = habits.filter(h=>h.isActive);
  return (

            const items=list.filter(h=>h.categoryId===c.id);

            return (
              <React.Fragment key={c.id}>
                <div className="section-label" style={{color:c.hex}}>{c.name}</div>
                { items.map(hb=>{
                  const streak = hb.frequencyType==='daily'
                    ? calcDailyStreak(hb.id, isDone)
                    : calcWeeklyStreak(hb.id, hb.frequencyCount||1, isDone);
                  const unit = hb.frequencyType==='daily' ? '日' : '週';
                  const rate = calcRate(hb, isDone).toFixed(1);
                  return (

                      <div className="name">{hb.title}</div>
                      <div className="nums">

/* ---------- 認証ゲート（ログイン状態でアプリを出し分け） ---------- */
function Gate(){
  const [phase, setPhase] = useState('loading');  // loading | signedout | ready
  const [account, setAccount] = useState(null);
  const [error, setError] = useState('');
  const [busy, setBusy] = useState(false);

  useEffect(()=>{
    let unsub = null;
    const timer = setTimeout(()=>{
      if(!window.HabitCloud){
        setError('読み込みに時間がかかっています。通信環境を確認して、ページを再読み込みしてください。');
        setPhase('signedout');
      }
    }, 8000);
    const start = ()=>{
      clearTimeout(timer);
      unsub = window.HabitCloud.onAuth(async (user)=>{
        if(!user){ setCloudUser(null,null); _loadedUid = null; setAccount(null); setPhase('signedout'); return; }
        const profile = { uid:user.uid, displayName:user.displayName||'', email:user.email||'', photoURL:user.photoURL||'' };
        setCloudUser(user.uid, profile);
        if(_loadedUid === user.uid){ setAccount(profile); setPhase('ready'); return; }
        try {
          const remote = await window.HabitCloud.pull(user.uid);
          if(remote){
            window.HabitCloud.KEYS.forEach(k=>{ if(remote[k]!=null) store.set(k, JSON.stringify(remote[k])); });
          } else {
            await window.HabitCloud.push(user.uid, snapshotAll(), profile);
          }
          _loadedUid = user.uid;
        } catch(e){ setError(window.HabitCloud.errorMessage(e)); }
        setAccount(profile);
        setPhase('ready');
      });
    };
    if(window.HabitCloud) start();
    else window.addEventListener('habitcloud-ready', start, { once:true });
    return ()=>{ clearTimeout(timer); if(unsub) unsub(); };
  }, []);

  const signIn = async ()=>{
    setError(''); setBusy(true);
    try { await window.HabitCloud.signInWithGoogle(); }
    catch(e){ setError(window.HabitCloud.errorMessage(e)); }
    setBusy(false);
  };

  if(phase==='loading')
    return <div className="screen" style={{minHeight:'78vh',display:'flex',alignItems:'center',
              justifyContent:'center',color:'var(--sumi-soft)',letterSpacing:'.1em'}}>読み込み中…</div>;
  if(phase==='signedout')
    return <Login onSignIn={signIn} error={error} busy={busy} />;
  return <App account={account} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Gate/>);
