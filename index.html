<title>習慣の暦 — 外見・健康・内面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<!-- ▼ クラウド同期（Firebase: Googleログイン ＋ Firestore） -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB3ascsGRGJ6_95YyIwUihmlVI6QCmPd5g",
    authDomain: "habit-app-24603.firebaseapp.com",
    projectId: "habit-app-24603",
    storageBucket: "habit-app-24603.firebasestorage.app",
    messagingSenderId: "39808191286",
    appId: "1:39808191286:web:202a7184d8745c14710197"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });

  async function pull(uid){
    const snap = await getDoc(doc(db, 'users', uid));
    if(!snap.exists()) return null;
    return (snap.data() || {}).data || null;
  }
  async function push(uid, data, profile){
    await setDoc(doc(db, 'users', uid), {
      profile: profile || {},
      data: data,
      updatedAt: serverTimestamp()
    }, { merge: true });
  }

  window.HabitCloud = {
    KEYS: ['habits','logs','settings','shopping','study'],
    onAuth(cb){ return onAuthStateChanged(auth, cb); },
    async signInWithGoogle(){
      try { const r = await signInWithPopup(auth, provider); return r.user; }
      catch(e){
        if(e.code==='auth/popup-closed-by-user' || e.code==='auth/cancelled-popup-request') return null;
        if(e.code==='auth/popup-blocked'){ await signInWithRedirect(auth, provider); return null; }
        throw e;
      }
    },
    signOut(){ return signOut(auth); },
    pull, push,
    errorMessage(e){
      switch(e && e.code){
        case 'auth/unauthorized-domain': return 'このドメインはFirebaseで許可されていません（承認済みドメインに nakamuar.github.io を追加してください）';
        case 'auth/operation-not-allowed': return 'FirebaseでGoogleログインを有効にしてください';
        case 'auth/network-request-failed': return 'ネットワークエラー — 接続を確認してください';
        case 'permission-denied': return 'Firestoreのルールでアクセスが拒否されました（ルールを設定してください）';
        case 'unavailable': return 'Firestoreに接続できません — データベースは作成済みですか？';
        default: return 'エラー: ' + ((e && e.message) || e);
      }
    }
  };

  // redirect方式でログインした場合の復帰処理 → 準備完了を通知
  getRedirectResult(auth).catch(()=>{}).finally(()=>{
    window.dispatchEvent(new Event('habitcloud-ready'));
  });
</script>

<style>
  :root{
    --washi:#F6F1E7;
    --paper:#FCFAF4;
    --sumi:#2B2722;
    --sumi-soft:#6B635A;
    --line:#E4DBC9;
    --line-strong:#C9B89A;
    --kenko:#5E8C6A;   /* 健康 常磐風 */
    --gaiken:#C77E8E;  /* 外見 退紅 */
    --naimen:#8A6BA1;  /* 内面 古代紫 */
    --kenko-bg:#E9F0EA;
    --gaiken-bg:#F5E7EA;
    --naimen-bg:#EDE7F1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Serif JP", "Yu Mincho","YuMincho","Hiragino Mincho ProN", serif;
    background:var(--washi);
    color:var(--sumi);
    -webkit-font-smoothing:antialiased;
  }
  #root{max-width:520px;margin:0 auto;min-height:100vh;position:relative;}
  .screen{padding:calc(20px + env(safe-area-inset-top)) 18px 96px 18px;}
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
  .topbar .title{font-size:21px;font-weight:600;letter-spacing:.08em;}
  .topbar .date{font-size:12.5px;color:var(--sumi-soft);letter-spacing:.06em;}

  /* 今日の達成 */
  .achieve{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:18px;
    box-shadow:0 1px 0 rgba(0,0,0,.02);
  }
  .achieve .ring{position:relative;width:64px;height:64px;flex:0 0 auto;}
  .achieve .ring svg{transform:rotate(-90deg);}
  .achieve .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:600;letter-spacing:.02em;}
  .achieve .lbl{font-size:13px;color:var(--sumi-soft);letter-spacing:.08em;}
  .achieve .big{font-size:18px;font-weight:600;margin-top:2px;letter-spacing:.06em;}

  /* 短冊リスト行 */
  .tanzaku{
    display:flex;align-items:center;background:var(--paper);
    border:1px solid var(--line);border-left-width:5px;border-radius:10px;
    padding:13px 14px;margin-bottom:9px;transition:background .15s;
  }
  .tanzaku.done{background:#F1EEE4;}
  .tanzaku .time{font-size:12px;color:var(--sumi-soft);width:46px;flex:0 0 auto;letter-spacing:.02em;}
  .tanzaku .body{flex:1;min-width:0;}
  .tanzaku .name{font-size:15.5px;line-height:1.4;}
  .tanzaku.done .name{color:var(--sumi-soft);text-decoration:line-through;text-decoration-thickness:1px;}

function App({ account }){
  const [habits, setHabits]   = useState(() => load('habits', null) || seedHabits());
  const [logs, setLogs]       = useState(() => load('logs', {}));        // { "id|date": true }
  const [settings, setSettings] = useState(() => load('settings', { name:'わたし', wakeTime:'07:00', sleepTime:'23:00' }));
  const [tab, setTab]         = useState('home');
  const [shopping, setShopping] = useState(() => load('shopping', null) || seedShopping());
  const [study, setStudy]     = useState(() => load('study', null) || seedStudy());
  const [editing, setEditing] = useState(null);      // habitオブジェクト or {new:true}
  const [shopEditing, setShopEditing] = useState(null);

  useEffect(()=>{ save('habits', habits); }, [habits]);
  useEffect(()=>{ save('logs', logs); }, [logs]);
  useEffect(()=>{ save('settings', settings); }, [settings]);
  useEffect(()=>{ save('shopping', shopping); }, [shopping]);
  useEffect(()=>{ save('study', study); }, [study]);

  const toggleLog = (hid, date) => {
    const k = logKey(hid, date);
    setLogs(prev => { const n = {...prev}; if(n[k]) delete n[k]; else n[k]=true; return n; });
  };
  const isDone = (hid, date) => !!logs[logKey(hid, date)];

  const saveHabit = (data) => {
    if(data.id){ setHabits(hs => hs.map(x => x.id===data.id ? {...x, ...data} : x)); }
    else { setHabits(hs => [...hs, {...data, id:(Math.max(0,...hs.map(x=>x.id))+1)}]); }
    setEditing(null);
  };
  const deleteHabit = (id) => { setHabits(hs => hs.filter(x=>x.id!==id)); setEditing(null); };
  const toggleActive = (id) => setHabits(hs => hs.map(x => x.id===id ? {...x, isActive:!x.isActive} : x));

  const toggleBought = (id) => setShopping(ss => ss.map(x => x.id===id ? {...x, bought:!x.bought} : x));
  const addShopItem = (data) => { setShopping(ss => [...ss, { id:'c'+Date.now(), tier:Number(data.tier), name:data.name, detail:data.detail||'', bought:false }]); setShopEditing(null); };
  const deleteShopItem = (id) => setShopping(ss => ss.filter(x=>x.id!==id));

  const setStudyQual = (qual) => setStudy(s => ({...s, qual}));
  const toggleStudyTask = (taskId) => setStudy(s => {
    const d = {...(s.done||{})};
    if(d[taskId]) delete d[taskId]; else d[taskId] = true;
    return {...s, done:d};
  });

  const ctx = { habits, logs, settings, setSettings, isDone, toggleLog, toggleActive, setEditing,
                shopping, toggleBought, deleteShopItem,
                study, setStudyQual, toggleStudyTask, account };

  return (
    <React.Fragment>
      { tab==='home'    && <Home {...ctx} /> }
      { tab==='weekly'  && <Weekly {...ctx} /> }
      { tab==='habits'  && <Habits {...ctx} /> }
      { tab==='stats'   && <Stats {...ctx} /> }
      { tab==='shop'    && <Shopping {...ctx} /> }
      { tab==='study'   && <Study {...ctx} /> }
      { tab==='settings'&& <Settings {...ctx} /> }

      { tab==='habits' &&
        <button className="fab" onClick={()=>setEditing({ new:true })}>＋ 習慣を追加</button> }
      { tab==='shop' &&
        <button className="fab" onClick={()=>setShopEditing({ new:true })}>＋ 品目を追加</button> }

      { editing &&
        <HabitForm habit={editing.new ? null : editing}
                   onSave={saveHabit} onDelete={deleteHabit} onClose={()=>setEditing(null)} /> }
      { shopEditing &&
        <ShoppingForm onSave={addShopItem} onClose={()=>setShopEditing(null)} /> }

      <TabBar tab={tab} setTab={setTab} />
    </React.Fragment>
  );
}

/* ---------- 計算：ストリーク・達成率 ---------- */
function calcDailyStreak(hid, isDone){
  let streak=0; let d=new Date();
  // 今日まだ未達成なら、昨日を起点にして数える（途中で途切れさせない配慮）
  if(!isDone(hid, ymd(d))) d=addDays(d,-1);
  while(isDone(hid, ymd(d))){ streak++; d=addDays(d,-1); }
  return streak;
}
function calcWeeklyStreak(hid, count, isDone){
  let streak=0; let ws=startOfWeekMon(new Date());
  // 今週がまだノルマ未達でも途切れさせないため、未達なら先週起点
  const weekDone = (start)=>{ let n=0; for(let i=0;i<7;i++){ if(isDone(hid, ymd(addDays(start,i)))) n++; } return n; };
  if(weekDone(ws) < count) ws=addDays(ws,-7);
  while(weekDone(ws) >= count){ streak++; ws=addDays(ws,-7); }
  return streak;
}
function calcRate(hb, isDone){
  const N=30; const base=new Date();
  if(hb.frequencyType==='daily'){
    let done=0; for(let i=0;i<N;i++){ if(isDone(hb.id, ymd(addDays(base,-i)))) done++; }
    return done/N*100;
  } else {
    // 週ノルマ × 4週 を分母に（直近約4週間）
    let done=0; for(let i=0;i<28;i++){ if(isDone(hb.id, ymd(addDays(base,-i)))) done++; }
    const denom = (hb.frequencyCount||1)*4;
    return Math.min(100, done/denom*100);
  }
}

    if(!title.trim()) return;

      id: habit?.id,
      title: title.trim(), categoryId: catId,
      frequencyType: freq, frequencyCount: freq==='weekly' ? Number(count) : null,

            <button className={freq==='daily'?'sel':''} onClick={()=>setFreq('daily')}>毎日</button>

  const qualInfo = QUALS.find(q=>q.id===qual) || QUALS[0];

  const phaseTasks = (p) => (p.blocks ? p.blocks.flatMap(b=>b.tasks) : (p.tasks||[]));
  const allTasks = plan.phases.flatMap(phaseTasks);
  const doneCount = allTasks.filter(t=>done[t.id]).length;
  const pct = allTasks.length ? Math.round(doneCount/allTasks.length*100) : 0;

  return (
    <div className="screen">

      { plan.cycle && (
        <div className="study-section">
          <div className="study-section-head">🔁 {plan.cycle.title}</div>
          <div className="study-cycle-desc">{plan.cycle.desc}</div>
          <div className="study-cycle">
            { plan.cycle.steps.map((s,i)=>(
              <React.Fragment key={s.n}>
                <div className="study-cycle-step">
                  <div className="study-cycle-num">{s.n}</div>
                  <div className="study-cycle-t">{s.t}</div>

          { plan.subjectFlows.map((f,i)=>(
            <div className="study-flow" key={i}>
              <div className="study-flow-head">{f.subject}</div>
              { f.steps.map((s,j)=>(
                <React.Fragment key={j}>
                  <div className="study-flow-step">{s}</div>
                  { j < f.steps.length-1 && <div className="study-flow-arrow">↓</div> }
                </React.Fragment>
              )) }
            </div>
          )) }
        </div>
      ) }

      { plan.monthly && plan.monthly.length>0 && (
        <div className="study-section">
          <div className="study-section-head">📅 月別の学習計画（標準ペース）</div>
          <div className="study-monthly-note">1日1〜1.5時間で進める場合の目安。短期集中なら下の8週間プランへ。</div>
          { plan.monthly.map((m,i)=>(
            <div className="study-monthly" key={i}>
              <div className="study-monthly-m">{m.m}</div>
              <div className="study-monthly-body">
                <div className="study-monthly-target">{m.target}</div>
                <div className="study-monthly-hours">{m.hours}</div>
              </div>
            </div>
          )) }
        </div>
      ) }

      { plan.examInfo && plan.examInfo.length>0 && (
        <div className="study-section">
          <div className="study-section-head">📝 試験の基本</div>
          { plan.examInfo.map((e,i)=>(
            <div className="study-exam" key={i}>
              <div className="study-exam-k">{e.k}</div>
              <div className="study-exam-v">{e.v}</div>
            </div>
          )) }
        </div>
      ) }

      { plan.materials.length>0 && (
        <div className="study-section">
          <div className="study-section-head">📚 おすすめ教材</div>
          { plan.materials.map((m,i)=>(
            <div className="study-mat" key={i}>
              <div className="study-mat-name">{m.name}</div>
              { m.detail && <div className="study-mat-detail">{m.detail}</div> }
            </div>
          )) }
        </div>
      ) }

      { plan.phases.map(p=>{
        const tasks = phaseTasks(p);
        const pDone = tasks.filter(t=>done[t.id]).length;
        const blocks = p.blocks || (p.tasks ? [{ label:null, tasks:p.tasks }] : []);
        return (
          <div className="shop-tier" key={p.phase}>
            <div className="shop-tier-head">
              <div className="t">Phase {p.phase}　{p.title}</div>
              <div className="p">{pDone}/{tasks.length}</div>
            </div>
            <div className="study-meta">
              <div><span className="study-meta-lbl">期間</span>{p.period}</div>
              <div><span className="study-meta-lbl">1日</span>{p.daily}</div>
              <div><span className="study-meta-lbl">目標</span>{p.goal}</div>
            </div>

            { p.timeBreak && p.timeBreak.length>0 && (
              <div className="study-timebreak">
                <div className="study-tb-head">⏱ 1日の時間配分の例</div>
                { p.timeBreak.map((t,i)=>(
                  <div className="study-tb-row" key={i}>
                    <span className="study-tb-label">{t.label}</span>
                    <span className="study-tb-time">{t.time}</span>
                  </div>
                )) }
              </div>
            ) }

            { p.caution && p.caution.length>0 && (
              <div className="study-caution">
                <div className="study-caution-head">⚠ 初心者が気を付けること</div>
                { p.caution.map((c,i)=>(
                  <div className="study-caution-item" key={i}>・{c}</div>
                )) }
              </div>
            ) }

            { blocks.map((b,bi)=>(
              <div className="study-block" key={bi}>
                { b.label && <div className="study-block-label">{b.label}</div> }
                { b.tasks.map(t=>{
                  const isDone = !!done[t.id];
                  return (
                    <div key={t.id} className={'shop-item'+(isDone?' bought':'')}>
                      <button className={'check'+(isDone?' on':'')} onClick={()=>toggleStudyTask(t.id)} aria-label="完了">{ isDone?'✓':'' }</button>
                      <div className="body">
                        <div className="nm">{t.text}</div>
                        { t.hint && <div className="dt">{t.hint}</div> }
                      </div>
                    </div>
                  );
                }) }
              </div>
            )) }
          </div>
        );
      }) }

      { plan.troubleshoot && (
        <div className="study-section">
          <div className="study-section-head">❓ {plan.troubleshoot.title}</div>
          <div className="study-trouble-intro">{plan.troubleshoot.intro}</div>
          { plan.troubleshoot.steps.map((s,i)=>(
            <div className="study-trouble" key={i}>
              <div className="study-trouble-t">{s.t}</div>
              <div className="study-trouble-d">{s.d}</div>
            </div>
          )) }
        </div>
      ) }

      { plan.output && (
        <div className="study-section">
          <div className="study-section-head">🎯 {plan.output.title}</div>
          <div className="study-trouble-intro">{plan.output.intro}</div>
          { plan.output.methods.map((m,i)=>(
            <div className="study-method" key={i}>
              <div className="study-method-t">{m.t}</div>
              <div className="study-method-d">{m.d}</div>
            </div>
          )) }
        </div>
      ) }

      { plan.tips.length>0 && (
        <div className="study-section">
          <div className="study-section-head">💡 得点アップのコツ</div>
          { plan.tips.map((t,i)=>(
            <div className="study-tip" key={i}>・{t}</div>
          )) }
        </div>
      ) }

      <div className="note">スケジュールはあくまで目安。仕事や生活に合わせて週単位で前後させてOK。大事なのは「過去問を毎日触る」を切らさないこと。</div>
    </div>
  );
}

function Shopping({ shopping, toggleBought, deleteShopItem }){
  const bought = shopping.filter(s=>s.bought).length;
  return (
    <div className="screen">
      <div className="topbar"><div className="title">買い物リスト</div>
        <div className="date">購入済み {bought}/{shopping.length}</div></div>

      { TIERS.map(t=>{
        const items = shopping.filter(s=>s.tier===t.tier);
        if(items.length===0) return null;
        const b = items.filter(s=>s.bought).length;
        return (
          <div className="shop-tier" key={t.tier}>
            <div className="shop-tier-head">
              <div className="t">第{t.tier}優先　{t.title}</div>
              <div className="p">{b}/{items.length}</div>
            </div>
            <div className="shop-tier-note">{t.note}</div>
            { items.map(s=>(
              <div key={s.id} className={"shop-item"+(s.bought?' bought':'')}>
                <button className={"check"+(s.bought?' on':'')} onClick={()=>toggleBought(s.id)} aria-label="購入済み">{ s.bought?'✓':'' }</button>
                <div className="body">
                  <div className="nm">{s.name}</div>
                  { s.detail && <div className="dt">{s.detail}</div> }
                </div>
                <button className="x" onClick={()=>{ if(confirm('この品目を削除しますか？')) deleteShopItem(s.id); }} aria-label="削除">✕</button>
              </div>
            )) }
          </div>
        );
      }) }
      <div className="note">一度に全部そろえず、第1優先から順に。生活リズムが回り始めてから次を足すと、出費も分散できます。体に触れるもの（マットレス・枕・椅子）はできれば店舗で試すと失敗が減ります。</div>
    </div>
  );
}

function ShoppingForm({ onSave, onClose }){
  const [name, setName]     = useState('');
  const [detail, setDetail] = useState('');
  const [tier, setTier]     = useState(1);
  const submit = () => { if(!name.trim()) return; onSave({ name:name.trim(), detail, tier }); };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>品目を追加</h3>
        <div className="field">
          <label>品名</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="例：スリッパ" />
        </div>
        <div className="field">
          <label>優先度</label>
          <select value={tier} onChange={e=>setTier(e.target.value)}>
            { TIERS.map(t=><option key={t.tier} value={t.tier}>第{t.tier}優先　{t.title}</option>) }
          </select>
        </div>
        <div className="field">
          <label>メモ・候補（任意）</label>
          <textarea value={detail} onChange={e=>setDetail(e.target.value)} placeholder="候補のブランドや条件など"></textarea>
        </div>
        <div className="form-actions">
          <button className="btn-sub" onClick={onClose}>やめる</button>
          <button className="btn-main" onClick={submit}>追加する</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- 下部タブ ---------- */
function TabBar({ tab, setTab }){
  const tabs = [
    { k:'home',    i:'⛩', l:'今日' },
    { k:'weekly',  i:'▦', l:'週間' },
    { k:'habits',  i:'❏', l:'管理' },
    { k:'stats',   i:'❀', l:'記録' },
    { k:'shop',    i:'☖', l:'買い物' },
    { k:'study',   i:'✦', l:'学習' },
    { k:'settings',i:'⚙', l:'設定' },
  ];
  return (
    <nav className="tabbar">
      { tabs.map(t=>(
        <button key={t.k} className={tab===t.k?'active':''} onClick={()=>setTab(t.k)}>
          <span className="ti">{t.i}</span><span className="tl">{t.l}</span>
        </button>
      )) }
    </nav>
  );
}

/* ---------- ログイン画面 ---------- */
function Login({ onSignIn, error, busy }){
  return (
    <div className="screen" style={{minHeight:'78vh',display:'flex',flexDirection:'column',
         alignItems:'center',justifyContent:'center',textAlign:'center',gap:20}}>
      <div style={{fontSize:32,letterSpacing:'.18em',color:'var(--sumi)'}}>習慣の暦</div>
      <div style={{fontSize:13,color:'var(--sumi-soft)',letterSpacing:'.04em'}}>外見・健康・内面、毎日の習慣を。</div>
      <div className="note" style={{maxWidth:300}}>
        記録をどの端末でも同じように使うため、Googleアカウントでログインしてください。
      </div>
      <button onClick={onSignIn} disabled={busy}
        style={{background:'var(--sumi)',color:'var(--paper)',border:'none',borderRadius:28,
                padding:'14px 26px',fontFamily:'inherit',fontSize:15,letterSpacing:'.08em',
                cursor:busy?'default':'pointer',opacity:busy?.6:1,
                boxShadow:'0 4px 14px rgba(43,39,34,.28)'}}>
        { busy ? 'ログイン中…' : 'Googleでログイン' }
      </button>
      { error && <div className="note" style={{color:'#b3433a',maxWidth:320}}>{error}</div> }
    </div>
  );
}

/* ---------- 認証ゲート（ログイン状態でアプリを出し分け） ---------- */
function Gate(){
  const [phase, setPhase] = useState('loading');  // loading | signedout | ready
  const [account, setAccount] = useState(null);
  const [error, setError] = useState('');
  const [busy, setBusy] = useState(false);

  useEffect(()=>{
    let unsub = null;
    const timer = setTimeout(()=>{
      if(!window.HabitCloud){
        setError('読み込みに時間がかかっています。通信環境を確認して、ページを再読み込みしてください。');
        setPhase('signedout');
      }
    }, 8000);
    const start = ()=>{
      clearTimeout(timer);
      unsub = window.HabitCloud.onAuth(async (user)=>{
        if(!user){ setCloudUser(null,null); _loadedUid = null; setAccount(null); setPhase('signedout'); return; }
        const profile = { uid:user.uid, displayName:user.displayName||'', email:user.email||'', photoURL:user.photoURL||'' };
        setCloudUser(user.uid, profile);
        if(_loadedUid === user.uid){ setAccount(profile); setPhase('ready'); return; }
        try {
          const remote = await window.HabitCloud.pull(user.uid);
          if(remote){
            window.HabitCloud.KEYS.forEach(k=>{ if(remote[k]!=null) store.set(k, JSON.stringify(remote[k])); });
          } else {
            await window.HabitCloud.push(user.uid, snapshotAll(), profile);
          }
          _loadedUid = user.uid;
        } catch(e){ setError(window.HabitCloud.errorMessage(e)); }
        setAccount(profile);
        setPhase('ready');
      });
    };
    if(window.HabitCloud) start();
    else window.addEventListener('habitcloud-ready', start, { once:true });
    return ()=>{ clearTimeout(timer); if(unsub) unsub(); };
  }, []);

  const signIn = async ()=>{
    setError(''); setBusy(true);
    try { await window.HabitCloud.signInWithGoogle(); }
    catch(e){ setError(window.HabitCloud.errorMessage(e)); }
    setBusy(false);
  };

  if(phase==='loading')
    return <div className="screen" style={{minHeight:'78vh',display:'flex',alignItems:'center',
              justifyContent:'center',color:'var(--sumi-soft)',letterSpacing:'.1em'}}>読み込み中…</div>;
  if(phase==='signedout')
    return <Login onSignIn={signIn} error={error} busy={busy} />;
  return <App account={account} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Gate/>);
</script>
